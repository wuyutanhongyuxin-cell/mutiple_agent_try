# 交易参数配置
trading:
  assets:
    major: ["BTC-PERP", "ETH-PERP"]
    all: ["BTC-PERP", "ETH-PERP", "SOL-PERP", "ARB-PERP", "DOGE-PERP"]

  data_feed:
    type: "mock"                    # "mock" | "live"
    source: "binance"
    interval_seconds: 60
    mock_csv_path: "data/btc_1h_2024.csv"

  aggregator:
    mode: "independent"             # "independent" | "voting"
    signal_window_seconds: 120

  costs:
    slippage_bps: 5              # 滑点 basis points (5 = 0.05%)
    taker_fee_rate: 0.0004       # Taker 手续费 0.04%
    maker_fee_rate: 0.0002       # Maker 手续费 0.02%
    funding_rate_8h: 0.00015     # 8h资金费率 0.015% (2024 BTC-USDT 均值约 0.017%)
    enable_costs: true           # false 可关闭（用于对比实验）

  anonymize: false               # true 启用资产匿名化（回测建议开启）

  risk:
    global_max_drawdown_pct: 25
    global_max_daily_loss_pct: 10
